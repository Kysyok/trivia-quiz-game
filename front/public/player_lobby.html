<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Player Lobby · Quiz</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="player-lobby-page">
    <main class="player-lobby-container">
        <!-- Заголовок -->
        <header class="player-lobby-header">
            <h1 class="player-lobby-title">waiting for game</h1>
        </header>

        <!-- Информация о игроке и комнате -->
        <div class="player-room-info">
            <div class="info-row">
                <span class="info-label">player</span>
                <span class="info-value" id="displayNickname">Player</span>
            </div>
            <div class="info-row">
                <span class="info-label">room</span>
                <span class="info-value room-code-display" id="displayRoom">000000</span>
            </div>
        </div>

        <!-- Индикатор ожидания -->
        <div class="waiting-indicator">
            <div class="waiting-animation">
                <span class="dot"></span>
                <span class="dot"></span>
                <span class="dot"></span>
            </div>
            <p class="waiting-text">waiting for host to start the game...</p>
        </div>

        <!-- Кнопка выхода -->
        <footer class="player-lobby-footer">
            <a href="join.html" class="btn btn-secondary btn-block">leave lobby</a>
        </footer>
    </main>

    <script src="js/main.js"></script>
    <script>
        // Получаем данные из sessionStorage
        const nickname = sessionStorage.getItem('playerNickname') || 'Player';
        const roomNumber = sessionStorage.getItem('roomNumber') || '000000';
        
        // Отображаем данные
        document.getElementById('displayNickname').textContent = nickname;
        document.getElementById('displayRoom').textContent = roomNumber;
        
        // Проверяем статус игры 
        // Для демо перенаправление на игру через 5 секунд
        setTimeout(() => {
            // Проверяем, не началась ли игра
            const gameStarted = sessionStorage.getItem('gameStarted');
            if (gameStarted === 'true') {
                window.location.href = 'quiz.html';
            }
        }, 1000);
        
        // для очстки данных при уходе со страницы
        window.addEventListener('beforeunload', function() {

        });
    </script>
</body>
</html>
