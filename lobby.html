<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Lobby · Quiz</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
</head>
<body class="lobby-page">
    <main class="lobby-container">
        <!-- Заголовок с информацией о комнате -->
        <header class="lobby-header">
            <h1 class="lobby-title">game lobby</h1>
            <div class="room-info">
                <span class="room-label">room code</span>
                <span class="room-code" id="roomCodeDisplay">123456</span>
            </div>
        </header>

        <!-- Список игроков -->
        <section class="players-section">
            <div class="section-header">
                <h2 class="section-title">players</h2>
                <span class="player-count" id="playerCount">0</span>
            </div>

            <div class="players-list" id="playersList">
                <!-- Игроки будут добавляться сюда динамически -->
                <div class="empty-state">
                    <p>waiting for players...</p>
                    <p class="empty-hint">share the room code to invite</p>
                </div>
            </div>
        </section>

        <!-- Кнопка начала игры -->
        <footer class="lobby-footer">
            <button class="btn btn-primary btn-block btn-start" id="startGameBtn" disabled>
                start game
            </button>
            <a href="index.html" class="btn btn-secondary btn-block btn-leave">
                leave lobby
            </a>
        </footer>
    </main>

    <script src="js/mock.js"></script>
    <script src="js/lobby.js"></script>
</body>
</html>
